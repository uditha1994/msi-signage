<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSI Campus Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Condensed:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0f1a;font-family:'Inter',sans-serif;color:#fff;overflow:hidden}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;transition:opacity .8s;pointer-events:none}
.screen.active{opacity:1;pointer-events:auto}

/* ── HEADER ── */
.hdr{background:linear-gradient(90deg,#8b0000 0%,#C0272D 100%);padding:8px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 3px 14px rgba(0,0,0,.35)}
.hdr-logos{display:flex;align-items:center}
.hdr-logos img{height:54px;object-fit:contain}
.hdr-divider{width:1px;height:44px;background:rgba(255,255,255,.3);margin:0 16px}
.hdr-center{flex:1;text-align:center}
.hdr-label{font-size:.78rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.7);font-weight:500}
.hdr-day{font-family:'Roboto Condensed',sans-serif;font-size:2.2rem;font-weight:700;color:#fff;letter-spacing:4px;line-height:1.1}
.hdr-right{text-align:right;min-width:170px}
.clock{font-family:'Roboto Condensed',sans-serif;font-size:2.7rem;font-weight:700;color:#fff;line-height:1;letter-spacing:2px}
.dateline{font-size:.82rem;color:rgba(255,255,255,.7);letter-spacing:.5px;margin-top:3px}

/* ── TIMETABLE SCREEN ── */
#tt-screen{background:linear-gradient(160deg,#0a0f1a 0%,#16213e 60%,#0d1520 100%)}

.tt-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:22px 38px 14px;position:relative;min-height:0}

/* Floor heading */
.floor-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.floor-name{font-size:.92rem;letter-spacing:3px;color:rgba(255,255,255,.55);text-transform:uppercase;font-weight:500}
.session-label{font-family:'Roboto Condensed',sans-serif;font-size:2.3rem;font-weight:600;color:#fcd34d;letter-spacing:1.5px;line-height:1.05;margin-top:3px}
.floor-meta{font-size:.88rem;color:rgba(255,255,255,.45);text-align:right}

/* Carousel — vertically stacks up to 2 cards, full height usage */
.carousel{flex:1;display:grid;gap:18px;min-height:0;overflow:hidden}
.carousel.rows-1{grid-template-rows:1fr}
.carousel.rows-2{grid-template-rows:1fr 1fr}

/* ── HORIZONTAL CARDS (photo left, content right) ── */
.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  display:flex;
  overflow:hidden;
  position:relative;
  animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;
  min-height:0;
}
@keyframes cardIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}

.card.live{
  background:rgba(34,197,94,.07);
  border-color:rgba(34,197,94,.4);
  box-shadow:0 0 0 1px rgba(34,197,94,.2),0 10px 32px rgba(34,197,94,.15);
}

.live-badge{
  position:absolute;top:18px;right:18px;
  display:flex;align-items:center;gap:7px;
  background:rgba(34,197,94,.22);
  padding:6px 13px;border-radius:16px;
  border:1px solid rgba(34,197,94,.45);
  z-index:5;
}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 10px #22c55e}50%{opacity:.4;box-shadow:0 0 2px #22c55e}}
.live-text{font-size:.78rem;color:#86efac;font-weight:700;letter-spacing:1.8px}

/* Square photo with rounded corners - LEFT side, large */
.photo-wrap{
  width:34%;
  min-width:240px;
  max-width:340px;
  flex-shrink:0;
  background:#1f2937;
  border-right:1px solid rgba(255,255,255,.08);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.card.live .photo-wrap{border-right-color:rgba(34,197,94,.25)}
.photo{
  width:78%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:24px;
  background:#1f2937;
}
.photo-ph{
  width:78%;
  aspect-ratio:1/1;
  border-radius:24px;
  background:linear-gradient(135deg,#374151,#1f2937);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:5rem;
  color:rgba(255,255,255,.35);
}

/* Content RIGHT side - bigger fonts */
.card-content{
  flex:1;
  padding:28px 34px 22px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-width:0;
}
.card-top{display:flex;flex-direction:column;gap:6px}

.prog-tag{
  display:inline-block;
  font-size:.95rem;
  letter-spacing:2.2px;
  color:#fbbf24;
  font-weight:700;
  text-transform:uppercase;
  padding:5px 14px;
  border:1px solid rgba(251,191,36,.35);
  border-radius:16px;
  background:rgba(251,191,36,.07);
  align-self:flex-start;
  margin-bottom:6px;
}

.module-name{
  font-size:2.1rem;
  font-weight:600;
  color:#fff;
  line-height:1.2;
  letter-spacing:-.3px;
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.lesson{
  font-size:1.25rem;
  color:#7dd3fc;
  font-style:italic;
  line-height:1.3;
  font-weight:300;
  margin-bottom:14px;
}

.lecturer{
  font-size:1.35rem;
  color:#c4b5fd;
  font-weight:500;
  letter-spacing:.2px;
  margin-bottom:8px;
}

.card-footer{
  padding-top:14px;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:1rem;
  color:rgba(255,255,255,.6);
  letter-spacing:.4px;
}
.card.live .card-footer{border-top-color:rgba(34,197,94,.18);color:#86efac}
.venue-sub{font-weight:500}
.time-sub{font-family:'Roboto Condensed',sans-serif;font-weight:700;letter-spacing:1.5px;font-size:1.1rem}

/* Empty state */
.empty-floor{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.25);gap:16px}
.empty-floor .ico{font-size:4rem}
.empty-floor .msg{font-size:1.1rem}

/* Pagination dots */
.dots{display:flex;justify-content:center;gap:7px;padding:14px 0 6px;flex-shrink:0}
.dot{width:26px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);transition:all .4s}
.dot.active{background:#C0272D;width:42px}
.dot.has-data{background:rgba(255,255,255,.32)}

/* Footer line */
.tt-footer{padding:7px 32px;display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:rgba(255,255,255,.34);border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.3);flex-shrink:0}
.quote{font-style:italic}

/* Progress bar */
.prog-wrap{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.05);z-index:999}
.prog-bar{height:100%;background:linear-gradient(90deg,#C0272D,#fbbf24);width:0%;transition:width .5s linear}

/* ── MEDIA SCREEN ── */
#media-screen{background:#000}
.media-container{position:relative;width:100%;height:100%}
.media-item{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .7s}
.media-item.active{opacity:1}
.media-item img{max-width:100%;max-height:100%;object-fit:contain}
.media-item video{width:100%;height:100%;object-fit:contain}
.no-media{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:rgba(255,255,255,.2);font-size:1rem}

/* ── MEETING SCREEN ── */
#meeting-screen{background:linear-gradient(150deg,#0a0f1a 0%,#3a0a0a 55%,#1a0505 100%)}
.mtg-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 60px;text-align:center}
.mtg-badge{background:linear-gradient(90deg,#C0272D,#8b0000);color:#fff;font-size:1.1rem;font-weight:800;letter-spacing:4px;padding:10px 28px;border-radius:30px;box-shadow:0 6px 24px rgba(192,39,45,.5);margin-bottom:28px;animation:mtgpulse 2.5s infinite}
@keyframes mtgpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.mtg-title{font-family:'Roboto Condensed',sans-serif;font-size:3.8rem;font-weight:700;color:#fff;line-height:1.1;letter-spacing:1px;max-width:1100px}
.mtg-text{font-size:1.4rem;color:#fcd34d;margin-top:24px;max-width:900px;line-height:1.5;font-weight:300}
.mtg-media{display:flex;gap:20px;margin-top:42px;align-items:center;justify-content:center;flex-wrap:wrap;max-width:1200px;position:relative;min-height:0}
.mtg-item{display:none;max-width:560px;max-height:42vh;border-radius:14px;object-fit:contain;box-shadow:0 12px 40px rgba(0,0,0,.6);border:3px solid rgba(255,255,255,.1)}
.mtg-item.active{display:block;animation:mtgfade .8s}
@keyframes mtgfade{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<div class="screen active" id="tt-screen">
  <div class="hdr">
    <div class="hdr-logos">
      <img src="/logos/msi_white.png" alt="MSI" onerror="this.style.display='none'">
      <div class="hdr-divider"></div>
      <img src="/logos/msu_white.png" alt="MSU" onerror="this.style.display='none'">
    </div>
    <div class="hdr-center">
      <div class="hdr-label">Classroom Allocation</div>
      <div class="hdr-day" id="day-display">MONDAY</div>
    </div>
    <div class="hdr-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="dateline" id="dateline"></div>
    </div>
  </div>

  <div class="tt-body">
    <div class="floor-head">
      <div>
        <div class="floor-name" id="floor-name">Floor</div>
        <div class="session-label" id="session-label">Sessions</div>
      </div>
      <div class="floor-meta" id="floor-meta">—</div>
    </div>

    <div class="carousel" id="carousel"></div>

    <div class="dots" id="dots"></div>
  </div>

  <div class="tt-footer">
    <div class="quote">❝ Success is a journey, not a destination ❞</div>
    <div id="next-info"></div>
  </div>
</div>

<div class="screen" id="media-screen">
  <div class="media-container" id="media-container">
    <div class="no-media" id="no-media"><span style="font-size:3rem">📷</span>No media uploaded yet</div>
  </div>
</div>

<div class="screen" id="meeting-screen">
  <div class="mtg-wrap">
    <div class="mtg-badge">📢 SPECIAL MEETING</div>
    <div class="mtg-title" id="mtg-title-disp">Special Meeting</div>
    <div class="mtg-text" id="mtg-text-disp"></div>
    <div class="mtg-media" id="mtg-media"></div>
  </div>
</div>

<div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>

<div id="fs-prompt" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99999;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-family:'Inter',sans-serif">
  <div style="font-size:3rem;margin-bottom:16px">⛶</div>
  <div style="font-size:1.4rem;font-weight:600">Tap anywhere for fullscreen</div>
  <div style="font-size:.9rem;color:rgba(255,255,255,.6);margin-top:8px">Best viewed in fullscreen mode</div>
</div>

<script>
const API=window.location.origin+'/api';
const VENUES=["5th Floor Lecture Hall","4th Floor Lecture Hall A","4th Floor Lecture Hall B",
  "3rd Floor Lecture Hall A","3rd Floor Lecture Hall B",
  "2nd Floor Computer Lab","2nd Floor Bio-Lab","Basement Research Room"];
const DAY_NAMES=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];

const FLOORS=[
  {name:'5th Floor',venues:['5th Floor Lecture Hall']},
  {name:'4th Floor',venues:['4th Floor Lecture Hall A','4th Floor Lecture Hall B']},
  {name:'3rd Floor',venues:['3rd Floor Lecture Hall A','3rd Floor Lecture Hall B']},
  {name:'2nd Floor',venues:['2nd Floor Computer Lab','2nd Floor Bio-Lab']},
  {name:'Basement',venues:['Basement Research Room']}
];

const CARDS_PER_SLIDE=2;  // Max 2 cards stacked vertically per slide

let appData=null;
let lecturers=[];
let currentScreen='tt';
let meetingActive=false, mtgTicker=null;
let mediaIdx=0, mediaTicker=null;
let slideIdx=0;
let slides=[];
let slideTicker=null;

function tick(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
}
setInterval(tick,1000); tick();

function todayDay(){ return DAY_NAMES[new Date().getDay()]; }
function nowMin(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function parseTime(t){ if(!t)return null; const[h,m]=(t||'').split(':').map(Number); return h*60+(m||0); }
function lecturerByName(name){ return name?lecturers.find(l=>l.name===name)||null:null; }

async function loadData(){
  try{
    const [dr,lr]=await Promise.all([fetch(API+'/data'),fetch(API+'/lecturers')]);
    appData=await dr.json();
    lecturers=(await lr.json()).lecturers||[];
    document.getElementById('dateline').textContent=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    const today=todayDay();
    document.getElementById('day-display').textContent=today;
    appData._display_day=today;

    const meeting=appData.meeting||{active:false};
    if(meeting.active){ showMeeting(meeting); return; }
    hideMeeting();

    buildSlides();
    renderMedia();
  }catch(e){console.error(e)}
}

function buildSlides(){
  const today=appData._display_day||todayDay();
  const rows=appData.week?(appData.week[today]||{}):(appData.rows||{});

  slides=[];
  FLOORS.forEach(floor=>{
    const allSessions=[];
    floor.venues.forEach(v=>{
      const vs=rows[v]?.sessions||[];
      vs.forEach(s=>allSessions.push({...s,_venue:v}));
    });
    if(!allSessions.length) return;

    const morning=allSessions.filter(s=>{const t=parseTime(s.time_start); return t!=null&&t<12*60;});
    const evening=allSessions.filter(s=>{const t=parseTime(s.time_start); return t!=null&&t>=12*60;});
    morning.sort((a,b)=>parseTime(a.time_start)-parseTime(b.time_start));
    evening.sort((a,b)=>parseTime(a.time_start)-parseTime(b.time_start));

    // Split each session group into chunks of CARDS_PER_SLIDE (2)
    const chunk=(arr,n)=>{const r=[];for(let i=0;i<arr.length;i+=n)r.push(arr.slice(i,i+n));return r;};
    chunk(morning,CARDS_PER_SLIDE).forEach(cards=>slides.push({floor:floor.name,session:'Morning Sessions',cards}));
    chunk(evening,CARDS_PER_SLIDE).forEach(cards=>slides.push({floor:floor.name,session:'Evening Sessions',cards}));
  });

  slideIdx=0;
  if(currentScreen==='tt') startSlideRotation();
}

function renderSlide(){
  const carousel=document.getElementById('carousel');
  const dotsBox=document.getElementById('dots');

  if(!slides.length){
    document.getElementById('floor-name').textContent='Today';
    document.getElementById('session-label').textContent='No Sessions Scheduled';
    document.getElementById('floor-meta').textContent='';
    carousel.className='carousel rows-1';
    carousel.innerHTML=`<div class="empty-floor"><div class="ico">📅</div><div class="msg">No sessions scheduled for today</div></div>`;
    dotsBox.innerHTML='';
    return;
  }

  const slide=slides[slideIdx];
  document.getElementById('floor-name').textContent=slide.floor;
  document.getElementById('session-label').textContent=slide.session;
  document.getElementById('floor-meta').textContent=`Slide ${slideIdx+1} of ${slides.length} · ${appData._display_day}`;

  // Vertical stack: 1 or 2 rows
  carousel.className='carousel rows-'+slide.cards.length;

  const now=nowMin();
  carousel.innerHTML=slide.cards.map(s=>{
    const st=parseTime(s.time_start), en=parseTime(s.time_end);
    const isLive=st!=null&&en!=null&&now>=st&&now<en;
    const lec=lecturerByName(s.lecturer);
    const photo=lec&&lec.image
      ? `<img class="photo" src="/profiles/${lec.image}" onerror="this.outerHTML='&lt;div class=&quot;photo-ph&quot;&gt;👤&lt;/div&gt;'">`
      : `<div class="photo-ph">👤</div>`;
    const timeLbl=s.time_start&&s.time_end?`${s.time_start} – ${s.time_end}`:(s.time_start||'');
    const venueShort=(s._venue||'').replace(/^(\d+\w*\s+Floor|Basement)\s+/,'')||s._venue||'';

    return `<div class="card${isLive?' live':''}">
      ${isLive?`<div class="live-badge"><span class="live-dot"></span><span class="live-text">LIVE</span></div>`:''}
      <div class="photo-wrap">${photo}</div>
      <div class="card-content">
        <div class="card-top">
          ${s.program?`<div class="prog-tag">${escHtml(s.program)}</div>`:''}
          <div class="module-name">${escHtml(s.subject||'Session')}</div>
          ${s.lesson?`<div class="lesson">▸ ${escHtml(s.lesson)}</div>`:''}
          <div class="lecturer">${escHtml(s.lecturer||'')}</div>
        </div>
        <div class="card-footer">
          <span class="venue-sub">${escHtml(venueShort)}</span>
          <span class="time-sub">${timeLbl}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  dotsBox.innerHTML=slides.map((_,i)=>`<div class="dot${i===slideIdx?' active':' has-data'}"></div>`).join('');
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function startSlideRotation(){
  clearInterval(slideTicker);
  renderSlide();
  if(slides.length<=1) return;
  const slideDur=(appData?.settings?.slide_per_floor||8)*1000;
  slideTicker=setInterval(()=>{
    slideIdx=(slideIdx+1)%slides.length;
    renderSlide();
    if(slideIdx===0 && appData?.media?.length){
      clearInterval(slideTicker);
      setTimeout(()=>showMedia(),400);
    }
  },slideDur);
}

function renderMedia(){
  if(!appData)return;
  const c=document.getElementById('media-container');
  c.querySelectorAll('.media-item').forEach(el=>el.remove());
  const nm=document.getElementById('no-media');
  if(!appData.media?.length){nm.style.display='flex';return;}
  nm.style.display='none';
  appData.media.forEach((m,i)=>{
    const d=document.createElement('div');
    d.className='media-item'+(i===0?' active':'');
    d.innerHTML=m.type==='video'?`<video src="/media/${m.filename}" muted autoplay loop playsinline></video>`
      :`<img src="/media/${m.filename}" alt="">`;
    c.appendChild(d);
  });
}

function showTT(){
  if(meetingActive)return;
  currentScreen='tt';
  document.getElementById('tt-screen').classList.add('active');
  document.getElementById('media-screen').classList.remove('active');
  startSlideRotation();
}

function showMedia(){
  if(meetingActive)return;
  if(!appData?.media?.length){showTT();return;}
  currentScreen='media';
  document.getElementById('media-screen').classList.add('active');
  document.getElementById('tt-screen').classList.remove('active');
  clearInterval(slideTicker);
  mediaIdx=0; showMediaSlide(0);
  const si=(appData?.settings?.slide_interval||8)*1000;
  clearInterval(mediaTicker);
  mediaTicker=setInterval(()=>{
    mediaIdx++;
    if(mediaIdx>=appData.media.length){
      clearInterval(mediaTicker);
      showTT();
      return;
    }
    showMediaSlide(mediaIdx);
  },si);
}

function showMediaSlide(i){
  document.querySelectorAll('.media-item').forEach((el,j)=>{
    el.classList.toggle('active',j===i);
    const v=el.querySelector('video'); if(v&&j===i)v.play();
  });
}

function showMeeting(m){
  const scr=document.getElementById('meeting-screen');
  document.getElementById('tt-screen').classList.remove('active');
  document.getElementById('media-screen').classList.remove('active');
  scr.classList.add('active');
  meetingActive=true;
  clearInterval(slideTicker);
  clearInterval(mediaTicker);

  document.getElementById('mtg-title-disp').textContent=m.title||'Special Meeting';
  document.getElementById('mtg-text-disp').textContent=m.text||'';
  document.getElementById('mtg-text-disp').style.display=m.text?'block':'none';

  const mc=document.getElementById('mtg-media');
  const media=m.media||[];
  if(media.length){
    mc.style.display='flex';
    mc.innerHTML=media.map((x,i)=>x.type==='video'
      ? `<video class="mtg-item${i===0?' active':''}" src="/meeting-media/${x.filename}" muted autoplay loop playsinline></video>`
      : `<img class="mtg-item${i===0?' active':''}" src="/meeting-media/${x.filename}">`).join('');
    clearInterval(mtgTicker);
    if(media.length>1){
      let mi=0;
      mtgTicker=setInterval(()=>{
        const items=mc.querySelectorAll('.mtg-item');
        items[mi]?.classList.remove('active');
        mi=(mi+1)%items.length;
        items[mi]?.classList.add('active');
      },6000);
    }
  } else {
    mc.style.display='none'; mc.innerHTML='';
  }
}
function hideMeeting(){
  if(!meetingActive)return;
  meetingActive=false;
  clearInterval(mtgTicker);
  document.getElementById('meeting-screen').classList.remove('active');
}

function goFullscreen(){
  const el=document.documentElement;
  const fn=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
  if(fn) fn.call(el).catch(()=>{});
}
function setupFullscreen(){
  goFullscreen();
  setTimeout(()=>{
    if(!document.fullscreenElement){
      document.getElementById('fs-prompt').style.display='flex';
    }
  },800);
}
document.addEventListener('click',()=>{
  if(!document.fullscreenElement) goFullscreen();
  const f=document.getElementById('fs-prompt'); if(f) f.style.display='none';
});
